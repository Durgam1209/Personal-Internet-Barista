name: Nightly Brew

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  brew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python automation/run_pipeline.py

      - name: Commit digest.json
        run: |
          git config user.name "personal-cafe-bot"
          git config user.email "bot@personal.cafe"
          git add data/digest.json
          git diff --staged --quiet || git commit -m "daily brew $(date +'%Y-%m-%d')"
          git push